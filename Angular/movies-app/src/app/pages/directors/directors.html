
<div class="flex justify-center">

    <p-table
        [value]="directors()"
        [loading]="loading()"
        [stripedRows]="true"
        [paginator]="true"
        [rows]="2"
        [rowsPerPageOptions]="[2, 3, 5]"
        [totalRecords]="totalRecords()"
        [lazy]="true"
        (onLazyLoad)="loadDirectors($event)"
    >
        <ng-template #header>
            <tr>
                <th pSortableColumn="id">ID <p-sortIcon field="id" /></th>
                <th pSortableColumn="firstName">First Name <p-sortIcon field="firstName" /></th>
                <th pSortableColumn="lastName">Last Name <p-sortIcon field="lastName" /></th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template #body let-director>
            <tr>
                <td>{{director.id}}</td>
                <td>{{director.firstName}}</td>
                <td>{{director.lastName}}</td>
                <td>
                    <div class="flex flex-row gap-2">
                        <p-button
                            icon="pi pi-pencil"
                            severity="info"
                        />
                        <p-button
                            icon="pi pi-trash"
                            severity="danger"
                        />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template #emptyMessage>
            <tr>
                <td colspan="4">
                    No directors found. Please try again.
                </td>
            </tr>
        </ng-template>
    </p-table>

</div>
