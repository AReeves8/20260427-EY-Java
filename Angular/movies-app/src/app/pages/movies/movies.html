

<div class="card">
    <p-dataview #dv [value]="allMovies()" [layout]="'grid'">

        <!--
            TEMPLATE REFERENCE VARIABLES
                - variables that contain a reference to some HTML element
                - gives access to underlying HTML
        -->
        <ng-template #header>
            <div class="flex justify-between">
                <div class="pl-5">
                    <p class="text-5xl">All Movies</p>
                </div>
                <div class="pr-5">
                    <p-button label="New Movie" />
                </div>
            </div>
        </ng-template>
        <ng-template #grid let-items>
            <div class="grid lg:grid-cols-4 sm:grid-cols-2 gap-4 p-4">
                @for (movie of allMovies(); track $index) {
                    <div class="p-6 border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 rounded">
                        <div class="flex flex-col justify-between h-40">
                            <div class="flex flex-row justify-between products-start gap-2">
                                <div>
                                    <div class="text-lg font-medium mt-1">{{ movie.title }}</div>
                                    <span class="font-medium text-surface-500 dark:text-surface-400 text-sm">{{ movie.director.firstName + " " + movie.director.lastName }}</span>
                                </div>
                                <div class="bg-surface-100 p-1" style="border-radius: 30px; height:100%">
                                    <div class="bg-surface-0 flex products-center gap-2 justify-center py-1 px-2" style="border-radius: 30px; box-shadow: 0px 1px 2px 0px rgba(0, 0, 0, 0.04), 0px 1px 2px 0px rgba(0, 0, 0, 0.06)">
                                        <span class="text-surface-900 font-medium text-sm">{{ movie.rating }}</span>
                                        <i class="pi pi-star-fill text-yellow-500"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col gap-6 mt-6">
                                <div class="flex justify-between gap-2">
                                    <button pButton icon="pi pi-pen-to-square" class="flex-auto whitespace-nowrap"></button>
                                    <button pButton icon="pi pi-trash" outlined class="flex-auto whitespace-nowrap"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                }
                @empty {
                    <p class="text-3xl">No Movies at this time.</p>
                }
            </div>
        </ng-template>
    </p-dataview>
</div>
