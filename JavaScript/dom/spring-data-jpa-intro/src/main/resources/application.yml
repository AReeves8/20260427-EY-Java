spring:
    output:
        ansi:  
            enabled: always
    
    datasource:
        url: jdbc:h2:mem:moviesdb           # name your db - if you want persistence between runs - jdbc:h2:file:[path]
        username: sa                        # default username
        password:                           # optional
        driver-class-name: org.h2.Driver    # database driver that jdbc uses

    # h2 needs the following as well. these are usually optional for other db connections
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect      # telling JPA that we're using H2
        defer-datasource-initialization: true                   # tells JPA to wait until hibernate has initialized before loading data into H2

        # fully optional depending on your situation
        hibernate:
            # tells hibernate how to handle DDL with your entities
            ddl-auto: create-drop   # hibernate will create the schema from our models and then drop them when the session ends 