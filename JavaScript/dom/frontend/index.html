<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Bootstrap to Style our Page</title>

    <!-- Including Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


    <!-- Including the JS we created -->
    <script src="index.js" defer></script>  <!-- defer will delay DOMContentLoaded until the JS script is processed -->

</head>
<body class="bg-dark">

    <!-- Bootstrap uses classes to apply styling -->

    
    <!-- CRUD Operations on Movies + Directors -->



    <!-- wraps a container around our form that we can use the Grid System with -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-6 m-8">
                <!-- 
                    Forms are very nice for taking in information from the user 
                        - can use forms to receive info on creating and updating records
                            - NOT THE ONLY WAY, BUT generally THE EASIEST
                -->
                <form id="new-movie-form" action="#">  <!-- forms naturally try to redirect you, so use # action to prevent. Or give it a page to redirect you to -->

                    <h3 class="h3 p-1 text-light">New Movie</h3>

                    <div class="row mb-3">

                        <div class="col-6">
                            <!-- Title Input -->
                            <div class="mx-1"> 
                                <label for="new-movie-title" class="form-label text-light">Movie Title</label>
                                <input type="text" class="form-control" id="new-movie-title" name="new-movie-title" placeholder="Avengers: Endgame">
                            </div>
                        </div>
                        <div class="col-4">
                            <!-- Genre Input -->
                            <div class="mx-1">
                                <label for="new-movie-genre" class="form-label text-light">Movie Genre</label>
                                <select id="new-movie-genre" class="form-select" name="new-movie-genre" aria-label="Movie Genre Form Select">
                                    <option selected>Open this select menu</option>
                                    <option value="ACTION">Action</option>
                                    <option value="ROMANCE">Romance</option>
                                    <option value="THRILLER">Thriller</option>
                                    <option value="SCIENCE_FICTION">Sci-Fi</option>
                                    <option value="COMEDY">Comedy</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-2">
                            <!-- Rating Input -->
                            <div class="mx-1"> 
                                <label for="new-movie-rating" class="form-label text-light">Movie Rating</label>
                                <input type="number" class="form-control" id="new-movie-rating" name="new-movie-rating" placeholder="10">
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <!-- Director First Name Input -->
                            <div class="mx-1"> 
                                <label for="new-director-firstname" class="form-label text-light">Director First Name</label>
                                <input type="text" class="form-control" id="new-director-firstname" name="new-director-firstname" placeholder="Russo">
                            </div>
                        </div>
                        <div class="col">
                            <!-- Director Last Name Input -->
                            <div class="mx-1"> 
                                <label for="new-director-lastname" class="form-label text-light">Director Last Name</label>
                                <input type="text" class="form-control" id="new-director-lastname" name="new-director-lastname" placeholder="Brothers">
                            </div>
                        </div>
                        
                    </div>
                    <div class="row">
                        <div class="col justify-content-right">
                            <button type="submit" class="btn btn-light mx-1">Submit</button>
                        </div>
                    </div>
                </form>

                <!-- UPDATE MOVIE FORM -->
                <form id="update-movie-form" action="#" style="display: none;">  

                    <h3 class="h3 p-1 text-light">Update Movie</h3>

                    <div class="row mb-3">

                        <div class="col-6">
                            <!-- Title Input -->
                            <div class="mx-1"> 
                                <label for="update-movie-title" class="form-label text-light">Movie Title</label>
                                <input type="text" class="form-control" id="update-movie-title" name="update-movie-title" >
                            </div>
                        </div>
                        <div class="col-4">
                            <!-- Genre Input -->
                            <div class="mx-1">
                                <label for="update-movie-genre" class="form-label text-light">Movie Genre</label>
                                <select id="update-movie-genre" class="form-select" name="update-movie-genre" aria-label="Movie Genre Form Select">
                                    <option selected>Open this select menu</option>
                                    <option value="ACTION">Action</option>
                                    <option value="ROMANCE">Romance</option>
                                    <option value="THRILLER">Thriller</option>
                                    <option value="SCIENCE_FICTION">Sci-Fi</option>
                                    <option value="COMEDY">Comedy</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-2">
                            <!-- Rating Input -->
                            <div class="mx-1"> 
                                <label for="update-movie-rating" class="form-label text-light">Movie Rating</label>
                                <input type="number" class="form-control" id="update-movie-rating" name="update-movie-rating" >
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <!-- Director First Name Input -->
                            <div class="mx-1"> 
                                <label for="update-director-firstname" class="form-label text-light">Director First Name</label>
                                <input type="text" class="form-control" id="update-director-firstname" name="update-director-firstname" >
                            </div>
                        </div>
                        <div class="col">
                            <!-- Director Last Name Input -->
                            <div class="mx-1"> 
                                <label for="update-director-lastname" class="form-label text-light">Director Last Name</label>
                                <input type="text" class="form-control" id="update-director-lastname" name="update-director-lastname" >
                            </div>
                        </div>
                        
                    </div>
                    <div class="row">
                        <div class="col justify-content-right">
                            <button type="submit" class="btn btn-light mx-1">Update</button>
                        </div>
                    </div>
                </form>

                <!-- DELETE MOVIE FORM -->
                <form id="delete-movie-form" action="#" style="display: none;">  

                    <h3 class="h3 p-1 text-light">Delete Movie?</h3>

                    <div class="row mb-3">

                        <div class="col-6">
                            <!-- Title Input -->
                            <div class="mx-1"> 
                                <label for="delete-movie-title" class="form-label text-light">Movie Title</label>
                                <input type="text" class="form-control" id="delete-movie-title" name="delete-movie-title" disabled>
                            </div>
                        </div>
                        <div class="col-4">
                            <!-- Genre Input -->
                            <div class="mx-1">
                                <label for="delete-movie-genre" class="form-label text-light">Movie Genre</label>
                                <select id="delete-movie-genre" class="form-select" name="delete-movie-genre" disabled aria-label="Movie Genre Form Select">
                                    <option selected>Open this select menu</option>
                                    <option value="ACTION">Action</option>
                                    <option value="ROMANCE">Romance</option>
                                    <option value="THRILLER">Thriller</option>
                                    <option value="SCIENCE_FICTION">Sci-Fi</option>
                                    <option value="COMEDY">Comedy</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-2">
                            <!-- Rating Input -->
                            <div class="mx-1"> 
                                <label for="delete-movie-rating" class="form-label text-light">Movie Rating</label>
                                <input type="number" class="form-control" id="delete-movie-rating" name="delete-movie-rating" disabled>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <!-- Director First Name Input -->
                            <div class="mx-1"> 
                                <label for="delete-director-firstname" class="form-label text-light">Director First Name</label>
                                <input type="text" class="form-control" id="delete-director-firstname" name="delete-director-firstname" disabled>
                            </div>
                        </div>
                        <div class="col">
                            <!-- Director Last Name Input -->
                            <div class="mx-1"> 
                                <label for="delete-director-lastname" class="form-label text-light">Director Last Name</label>
                                <input type="text" class="form-control" id="delete-director-lastname" name="delete-director-lastname" disabled>
                            </div>
                        </div>
                        
                    </div>
                    <div class="row">
                        <div class="col justify-content-right">
                            <button type="submit" class="btn btn-danger mx-1">Delete</button>
                        </div>
                    </div>
                </form>
            </div>

            
            <div class="col">
                <!-- Tables - easy way to display info -->
                <table id="movie-table" class="table table-light table-hover my-8">
                    <thead>
                        <tr>
                            <!-- <th>ID</th>  you don't NEED to display data just cause you have it  -->
                            <th>Title</th>
                            <th>Genre</th>
                            <th>Rating</th>
                            <th>Director</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody id="movie-table-body">
                        <!-- movie data will be added by the JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>



    <!-- Including Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
